<!DOCTYPE html>
<html lang="ja" xmlns="http://thymeleaf.com">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ホーム/ブログ一覧</title>
</head>

<body>
  <header>
    <h1><a href="/blogs">ブログまとめ</a></h1>
    <form action="/blogs" method="get">
      <input type="text" name="keyword" placeholder="タイトルで検索">
      <button type="submit">検索</button>
    </form>
    <a th:href="@{/mypage}" class="btn">マイページ</a>
    <a th:href="@{/post}" class="btn">新規投稿</a>
  </header>
  <h2>ブログ一覧</h2>
  <table>
    <thead>
      <tr>
        <th>番号</th>
        <th>タイトル</th>
        <th>内容</th>
      </tr>
    </thead>
    <tbody>
      <tr th:each ="blog : ${blogs}">
        <td th:text ="${blog.id}"></td>
        <td th:text ="${blog.title}"></td>
        <td th:text ="${#strings.abbreviate(blog.content, 20)}"></td>
      </tr>
    </tbody>
  </table>
</body>

</html>
