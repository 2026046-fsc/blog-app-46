<!DOCTYPE html>
<html lang="ja" xmlns="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <title>共通レイアウト</title>
</head>

<body>

  <header th:fragment="header">
    <h1><a href="/blogs">ブログまとめ</a></h1>
    <form action="/blogs" method="get">
      <input type="text" name="keyword" placeholder="タイトルで検索">
      <button type="submit">検索</button>
    </form>
    <a th:href="@{/mypage}" class="btn">マイページ</a>
    <a th:href="@{/post}" class="btn">新規投稿</a>
    <h2>ブログ一覧</h2>
  </header>

</body>

</html>
